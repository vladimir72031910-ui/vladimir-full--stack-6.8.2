<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS service center</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="main__one">

        <div class="title1">

            <h1 class="title_uslugi">

                Услуги и сервисы

            </h1>
            
            <div class="title1_button">
                
                <span class="button_text"> 
                    
                    Оставить заявку 

                </span>

                <button class="pink_button">

                    <img src="./repair.svg" alt="repair.svg">

                </button>

                <span class="button_text">
                    
                    Статус ремонта
                
                </span>

                <button class="pink_button">

                    <img src="./checkstatus.svg" alt="checkstatus.svg">

                </button>


            </div>

        </div>

        <div class="scroll_buttons">

            <button class="title1__scroll 
              scroll-size1">
              Ремонтируемые бренды
            </button>

            <button class="title1__scroll 
              scroll-size2">
              Ремонтируемые устройства
            </button>

            <button class="title1__scroll 
               scroll-size3">
                Цены на услуги
            </button>

            <button class="title1__scroll 
              scroll-size4">
              Адреса сервисных центров
            </button>

            <button class="title1__scroll 
              scroll-size5">
              Специальные цены
            </button>

        </div>


    </main>
</body>
</html>
